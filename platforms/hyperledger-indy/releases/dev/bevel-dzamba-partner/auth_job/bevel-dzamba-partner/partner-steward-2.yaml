apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: bevel-dzamba-partner-partner-steward-2-auth-job
  annotations:
    fluxcd.io/automated: "false"
  namespace: bevel-dzamba-partner-ns
spec:
  releaseName: bevel-dzamba-partner-partner-steward-2-auth-job
  interval: 1m
  chart:
   spec:
    chart: platforms/hyperledger-indy/charts/indy-auth-job
    sourceRef:
      kind: GitRepository
      name: flux-bevel
      namespace: flux-bevel
  values:
    metadata:
      name: bevel-dzamba-partner-partner-steward-2-auth-job
      namespace: bevel-dzamba-partner-ns
    network:
      name: bevel
      kubernetes_url: https://192.168.49.2:8443
    image:
      name: bevel-dzamba-partner
      repository: alpine:3.9.4
      pullPolicy: IfNotPresent
    vault:
      address: http://192.168.29.198:8200
      identity: partner-steward-2
      admin_auth_path: kubernetes-bevel-dzamba-partner-admin-auth
      policy: bevel-dzamba-partner-partner-steward-2-ro
      policy_content: path \"/bevel-dzamba-partner/data/stewards/partner-steward-2/*\" { capabilities = [ \"read\", \"list\" ] }
      auth_path: kubernetes-bevel-dzamba-partner-partner-steward-2-auth
    account:
      admin_service: bevel-dzamba-partner-admin-vault-auth
      admin_role: rw
      service: bevel-dzamba-partner-partner-steward-2-vault-auth
      role: ro
